name: Deploy to Tencent Cloud
on:
  push:
    branches:
      - master

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate deploy configuration
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          APP_DIR: ${{ secrets.APP_DIR || vars.APP_DIR }}
          FLOWSPACE_DATABASE_URL: ${{ secrets.FLOWSPACE_DATABASE_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          FLOWSPACE_SESSION_SECRET: ${{ secrets.FLOWSPACE_SESSION_SECRET }}
          FLOWSPACE_ALLOWED_ORIGINS: ${{ secrets.FLOWSPACE_ALLOWED_ORIGINS || vars.FLOWSPACE_ALLOWED_ORIGINS }}
        run: |
          set -eu

          missing=0
          for name in SERVER_HOST SERVER_USER APP_DIR; do
            if [ -z "$(eval "printf '%s' \"\${$name:-}\"")" ]; then
              echo "::error title=Missing deploy configuration::$name is required. Set it as a GitHub Secret or Variable."
              missing=1
            fi
          done

          if [ -z "${SERVER_SSH_KEY:-}" ] && [ -z "${SERVER_PASSWORD:-}" ]; then
            echo "::error title=Missing deploy credential::Set SERVER_SSH_KEY or SERVER_PASSWORD as a GitHub Secret."
            missing=1
          fi

          if [ -z "${FLOWSPACE_DATABASE_URL:-}" ] && [ -z "${POSTGRES_PASSWORD:-}" ]; then
            echo "::error title=Missing database credential::Set FLOWSPACE_DATABASE_URL or POSTGRES_PASSWORD as a GitHub Secret."
            missing=1
          fi

          for name in FLOWSPACE_SESSION_SECRET FLOWSPACE_ALLOWED_ORIGINS; do
            if [ -z "$(eval "printf '%s' \"\${$name:-}\"")" ]; then
              echo "::error title=Missing auth configuration::$name is required for production auth."
              missing=1
            fi
          done

          if printf '%s' "${FLOWSPACE_ALLOWED_ORIGINS:-}" | grep -Eq '(^|,)[[:space:]]*https?://[^/?#[:space:],]+/[[:space:]]*(,|$)'; then
            echo "::notice title=Auth origin normalization::FLOWSPACE_ALLOWED_ORIGINS may include a root trailing slash; deploy will normalize it before writing .env."
          fi

          exit "$missing"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.APP_DIR || vars.APP_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          FLOWSPACE_DATABASE_URL: ${{ secrets.FLOWSPACE_DATABASE_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST || vars.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT || vars.POSTGRES_PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER || vars.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB || vars.POSTGRES_DB }}
          POSTGRES_MAINTENANCE_DB: ${{ secrets.POSTGRES_MAINTENANCE_DB || vars.POSTGRES_MAINTENANCE_DB }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT || vars.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          ARTICLE_SEARCH_API_KEY: ${{ secrets.ARTICLE_SEARCH_API_KEY }}
          FLOWSPACE_NOTION_TOKEN: ${{ secrets.FLOWSPACE_NOTION_TOKEN }}
          FLOWSPACE_SESSION_SECRET: ${{ secrets.FLOWSPACE_SESSION_SECRET }}
          FLOWSPACE_ALLOWED_ORIGINS: ${{ secrets.FLOWSPACE_ALLOWED_ORIGINS || vars.FLOWSPACE_ALLOWED_ORIGINS }}
          FLOWSPACE_COOKIE_SECURE: ${{ vars.FLOWSPACE_COOKIE_SECURE }}
          FLOWSPACE_BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.FLOWSPACE_BOOTSTRAP_ADMIN_EMAIL || vars.FLOWSPACE_BOOTSTRAP_ADMIN_EMAIL }}
          FLOWSPACE_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.FLOWSPACE_BOOTSTRAP_ADMIN_PASSWORD }}
          FLOWSPACE_BOOTSTRAP_ADMIN_NAME: ${{ secrets.FLOWSPACE_BOOTSTRAP_ADMIN_NAME || vars.FLOWSPACE_BOOTSTRAP_ADMIN_NAME }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}
          VITE_APP_BASE: ${{ vars.VITE_APP_BASE }}
        with:
          host: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || vars.SERVER_PORT || '22' }}
          command_timeout: 60m
          envs: APP_DIR,DEPLOY_BRANCH,FLOWSPACE_DATABASE_URL,POSTGRES_PASSWORD,POSTGRES_HOST,POSTGRES_PORT,POSTGRES_USER,POSTGRES_DB,POSTGRES_MAINTENANCE_DB,MINIO_ENDPOINT,MINIO_ACCESS_KEY,MINIO_SECRET_KEY,AI_API_KEY,ARTICLE_SEARCH_API_KEY,FLOWSPACE_NOTION_TOKEN,FLOWSPACE_SESSION_SECRET,FLOWSPACE_ALLOWED_ORIGINS,FLOWSPACE_COOKIE_SECURE,FLOWSPACE_BOOTSTRAP_ADMIN_EMAIL,FLOWSPACE_BOOTSTRAP_ADMIN_PASSWORD,FLOWSPACE_BOOTSTRAP_ADMIN_NAME,FRONTEND_PORT,BACKEND_PORT,VITE_APP_BASE
          script: |
            set -eu

            : "${APP_DIR:?APP_DIR is required}"
            cd "$APP_DIR"

            echo "Deploy directory"
            pwd
            ls -la

            echo "Pull latest code"
            git fetch --all
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-master}"
            git reset --hard "origin/${DEPLOY_BRANCH}"
            git rev-parse --show-toplevel
            git rev-parse --short HEAD

            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml was not found in APP_DIR after checkout."
              echo "APP_DIR must point to the repository root that contains docker-compose.yml."
              find . -maxdepth 2 \( -name 'docker-compose.yml' -o -name 'compose.yml' -o -name 'docker-compose.yaml' -o -name 'compose.yaml' \) -print
              exit 1
            fi

            if [ -z "${FLOWSPACE_DATABASE_URL:-}" ]; then
              : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD or FLOWSPACE_DATABASE_URL is required}"
              POSTGRES_HOST="${POSTGRES_HOST:-119.91.114.203}"
              POSTGRES_PORT="${POSTGRES_PORT:-19588}"
              POSTGRES_USER="${POSTGRES_USER:-postgres}"
              POSTGRES_DB="${POSTGRES_DB:-flowspace_prod}"
              FLOWSPACE_DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"
            fi

            MINIO_ENDPOINT="${MINIO_ENDPOINT:-http://119.91.114.203:19000}"
            FRONTEND_PORT="${FRONTEND_PORT:-4200}"
            BACKEND_PORT="${BACKEND_PORT:-4201}"
            VITE_APP_BASE="${VITE_APP_BASE:-/}"

            normalize_allowed_origins() {
              printf '%s' "$1" | awk -F, 'BEGIN { OFS="," } {
                for (i = 1; i <= NF; i++) {
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", $i)
                  if ($i ~ /^https?:\/\/[^\/?#[:space:],]+\/$/) {
                    sub(/\/$/, "", $i)
                  }
                }
                print
              }'
            }

            FLOWSPACE_ALLOWED_ORIGINS="$(normalize_allowed_origins "${FLOWSPACE_ALLOWED_ORIGINS:-}")"

            {
              printf 'FLOWSPACE_DATABASE_URL=%s\n' "$FLOWSPACE_DATABASE_URL"
              printf 'MINIO_ENDPOINT=%s\n' "$MINIO_ENDPOINT"
              printf 'MINIO_ACCESS_KEY=%s\n' "${MINIO_ACCESS_KEY:-}"
              printf 'MINIO_SECRET_KEY=%s\n' "${MINIO_SECRET_KEY:-}"
              printf 'AI_API_KEY=%s\n' "${AI_API_KEY:-}"
              printf 'ARTICLE_SEARCH_API_KEY=%s\n' "${ARTICLE_SEARCH_API_KEY:-}"
              printf 'FLOWSPACE_NOTION_TOKEN=%s\n' "${FLOWSPACE_NOTION_TOKEN:-}"
              printf 'FLOWSPACE_SESSION_SECRET=%s\n' "${FLOWSPACE_SESSION_SECRET:-}"
              printf 'FLOWSPACE_ALLOWED_ORIGINS=%s\n' "${FLOWSPACE_ALLOWED_ORIGINS:-}"
              printf 'FLOWSPACE_COOKIE_SECURE=%s\n' "${FLOWSPACE_COOKIE_SECURE:-true}"
              printf 'FLOWSPACE_BOOTSTRAP_ADMIN_EMAIL=%s\n' "${FLOWSPACE_BOOTSTRAP_ADMIN_EMAIL:-}"
              printf 'FLOWSPACE_BOOTSTRAP_ADMIN_PASSWORD=%s\n' "${FLOWSPACE_BOOTSTRAP_ADMIN_PASSWORD:-}"
              printf 'FLOWSPACE_BOOTSTRAP_ADMIN_NAME=%s\n' "${FLOWSPACE_BOOTSTRAP_ADMIN_NAME:-}"
              printf 'FRONTEND_PORT=%s\n' "$FRONTEND_PORT"
              printf 'BACKEND_PORT=%s\n' "$BACKEND_PORT"
              printf 'VITE_APP_BASE=%s\n' "$VITE_APP_BASE"
            } > .env

            ensure_postgres_database() {
              db_url="$1"
              db_base="${db_url%%\?*}"
              db_query=""
              if [ "$db_base" != "$db_url" ]; then
                db_query="${db_url#"$db_base"}"
              fi

              target_db="${db_base##*/}"
              db_prefix="${db_base%/*}"
              if [ -z "$target_db" ] || [ "$target_db" = "$db_base" ] || [ -z "$db_prefix" ] || [ "$db_prefix" = "$db_base" ]; then
                echo "Cannot parse PostgreSQL database name from FLOWSPACE_DATABASE_URL"
                exit 1
              fi

              maintenance_db="${POSTGRES_MAINTENANCE_DB:-postgres}"
              maintenance_url="${db_prefix}/${maintenance_db}${db_query}"
              escaped_db="$(printf '%s' "$target_db" | sed "s/'/''/g")"
              create_db_sql="SELECT format('CREATE DATABASE %I', '${escaped_db}') WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = '${escaped_db}')\\gexec"

              echo "Ensure PostgreSQL database exists: ${target_db}"
              if ! command -v psql >/dev/null 2>&1; then
                echo "psql client is required on the deploy server. Install it with: sudo apt-get install -y postgresql-client"
                exit 1
              fi
              printf "%s\n" "$create_db_sql" | psql "$maintenance_url" --set=ON_ERROR_STOP=1
            }

            ensure_postgres_database "$FLOWSPACE_DATABASE_URL"

            echo "Build images"
            docker compose -f docker-compose.yml config >/dev/null
            docker compose -f docker-compose.yml build

            echo "Restart service"
            if ! docker compose -f docker-compose.yml up -d --remove-orphans --wait; then
              echo "docker compose up failed. Current service status:"
              docker compose -f docker-compose.yml ps || true
              echo "Backend health details:"
              docker inspect --format='{{json .State.Health}}' flowspace-backend || true
              echo "Backend logs:"
              docker compose -f docker-compose.yml logs --tail=200 backend || true
              exit 1
            fi
            docker compose -f docker-compose.yml ps

            echo "Clean unused images"
            docker image prune -f
            echo "Deploy success"
