name: flowspace

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    image: flowspace-backend:latest
    container_name: flowspace-backend
    restart: unless-stopped
    environment:
      FLOWSPACE_ENV: prod
      PORT: 4201
      FLOWSPACE_DATABASE_DRIVER: postgres
      FLOWSPACE_DATABASE_URL: ${FLOWSPACE_DATABASE_URL:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-}@${POSTGRES_HOST:-192.168.1.20}:${POSTGRES_PORT:-19588}/${POSTGRES_DB:-flowspace_prod}?sslmode=disable}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://192.168.1.20:19000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      AI_API_KEY: ${AI_API_KEY:-}
      ARTICLE_SEARCH_API_KEY: ${ARTICLE_SEARCH_API_KEY:-}
      FLOWSPACE_NOTION_TOKEN: ${FLOWSPACE_NOTION_TOKEN:-}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${BACKEND_PORT:-4201}:4201"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4201/api/folders >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE: ${VITE_APP_BASE:-/}
    image: flowspace-frontend:latest
    container_name: flowspace-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4200/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
