name: flowspace

services:
  backend:
    image: golang:1.26-alpine
    container_name: flowspace-backend
    restart: unless-stopped
    working_dir: /app/backend
    environment:
      FLOWSPACE_ENV: prod
      PORT: 4201
      FLOWSPACE_DATABASE_DRIVER: postgres
      FLOWSPACE_DATABASE_URL: ${FLOWSPACE_DATABASE_URL:-postgres://postgres:12345@192.168.1.20:19588/flowspace_prod?sslmode=disable}
      AI_API_KEY: ${AI_API_KEY:-}
      ARTICLE_SEARCH_API_KEY: ${ARTICLE_SEARCH_API_KEY:-}
      FLOWSPACE_NOTION_TOKEN: ${FLOWSPACE_NOTION_TOKEN:-}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${BACKEND_PORT:-4201}:4201"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4201/api/folders >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    command: >
      sh -c "apk add --no-cache ca-certificates tzdata &&
      go run ./cmd/server/main.go"
    volumes:
      - ./backend:/app/backend
      - flowspace_go_mod:/go/pkg/mod
      - flowspace_go_build:/root/.cache/go-build

  frontend:
    image: node:24-alpine
    container_name: flowspace-frontend
    restart: unless-stopped
    working_dir: /app/frontend
    environment:
      VITE_BACKEND_HOST: backend
      VITE_BACKEND_PORT: 4201
      VITE_APP_BASE: /
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4200/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    command: >
      sh -c "npm install &&
      npm run build &&
      npm run preview -- --host 0.0.0.0 --port 4200"
    volumes:
      - ./frontend:/app/frontend
      - flowspace_frontend_node_modules:/app/frontend/node_modules

volumes:
  flowspace_go_mod:
  flowspace_go_build:
  flowspace_frontend_node_modules:
