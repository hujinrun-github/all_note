server {
    listen 4200;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://backend:4201/api/;
        proxy_http_version 1.1;
        # Roadmap generation may legitimately wait for the AI provider for up
        # to 120 seconds. Keep the proxy window slightly larger so nginx does
        # not turn a still-running successful request into a 504 response.
        proxy_connect_timeout 10s;
        proxy_send_timeout 150s;
        proxy_read_timeout 150s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
